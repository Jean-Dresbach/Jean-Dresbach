name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Jean-Dresbach
          outputs: dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: generate

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
